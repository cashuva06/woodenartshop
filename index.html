<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WoodenArtShop Banner</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Caveat:wght@700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Jost', sans-serif;
    }

    .banner {
      width: 1400px;
      height: 350px;
      position: relative;
      overflow: hidden;
      display: flex;
      border-radius: 4px;
    }

    /* LEFT — product image */
    .banner-left {
      width: 48%;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .banner-left img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center left;
      display: block;
    }

    /* Diagonal cut overlay */
    .banner-left::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom right,
        transparent 0%,
        transparent 55%,
        rgba(10,10,10,0.95) 70%,
        rgba(10,10,10,1) 100%
      );
    }

    /* Diagonal slice on right edge */
    .banner-left::before {
      content: '';
      position: absolute;
      top: 0; right: -40px; bottom: 0;
      width: 80px;
      background: #0a0a0a;
      clip-path: polygon(40px 0, 100% 0, 100% 100%, 0% 100%);
      z-index: 2;
    }

    /* RIGHT — text */
    .banner-right {
      flex: 1;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 2.5rem 3rem 2.5rem 2rem;
      position: relative;
      overflow: hidden;
    }

    /* Subtle red accent glow */
    .banner-right::before {
      content: '';
      position: absolute;
      top: -60px; left: -60px;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(200,30,30,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Watermark text */
    .banner-right::after {
      content: 'WOOD';
      position: absolute;
      bottom: -20px; right: -10px;
      font-family: 'Black Ops One', sans-serif;
      font-size: 7rem;
      color: rgba(255,255,255,0.03);
      letter-spacing: 0.05em;
      pointer-events: none;
      user-select: none;
    }

    .banner-tag {
      font-size: 0.62rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #c8291e;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .banner-tag::before {
      content: '';
      display: block;
      width: 28px; height: 1.5px;
      background: #c8291e;
    }

    .banner-title {
      font-family: 'Black Ops One', sans-serif;
      font-size: clamp(1.8rem, 3.2vw, 2.8rem);
      line-height: 1.05;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 1rem;
    }

    .banner-title span {
      color: #c8291e;
    }

    .banner-sub {
      font-family: 'Caveat', cursive;
      font-size: 1.25rem;
      color: rgba(255,255,255,0.65);
      line-height: 1.5;
      margin-bottom: 1.6rem;
      font-weight: 700;
    }

    .banner-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      background: #c8291e;
      color: #fff;
      text-decoration: none;
      padding: 0.7rem 1.6rem;
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-family: 'Jost', sans-serif;
      font-weight: 500;
      width: fit-content;
      transition: background 0.25s, gap 0.25s;
      border-radius: 2px;
    }
    .banner-cta:hover {
      background: #a31f16;
      gap: 1.2rem;
    }

    /* Animated entrance */
    .banner-tag  { animation: fadeUp 0.6s 0.1s both; }
    .banner-title { animation: fadeUp 0.6s 0.25s both; }
    .banner-sub  { animation: fadeUp 0.6s 0.4s both; }
    .banner-cta  { animation: fadeUp 0.6s 0.55s both; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Thin red top border accent */
    .banner::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #c8291e 0%, #ff6b4a 50%, transparent 100%);
      z-index: 10;
    }

    /* Bottom label */
    .corner-label {
      position: absolute;
      bottom: 1rem; left: 1.5rem;
      font-size: 0.58rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      z-index: 5;
    }
  </style>
</head>
<body>

<div class="banner">
  <!-- Left: product image -->
  <div class="banner-left">
    <img src="/mnt/user-data/uploads/web4.png" alt="Handcrafted Wood Decor"/>
  </div>

  <!-- Right: text content -->
  <div class="banner-right">
    <div class="banner-tag">Handmade · Unique · Ships Worldwide</div>
    <h1 class="banner-title">
      Handcrafted<br/>
      <span>Wood</span> Decor
    </h1>
    <p class="banner-sub">
      Each multilayer piece is handmade<br/>
      with care and creativity.
    </p>
    <a href="https://etsy.com" class="banner-cta">
      Shop on Etsy
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
        <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </a>
  </div>

  <div class="corner-label">WoodenArtShop</div>
</div>

</body>
</html>
